<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Flash Lab</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; height: 100vh; background: #f4f4f4; }
        
        /* Sidebar Menu */
        #menu { width: 250px; background: #333; color: white; padding: 20px; overflow-y: auto; }
        #menu h2 { font-size: 1.2em; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .menu-item { 
            display: block; width: 100%; padding: 10px; margin: 5px 0;
            background: #444; border: none; color: white; text-align: left;
            cursor: pointer; border-radius: 4px; transition: 0.2s;
        }
        .menu-item:hover { background: #666; }
        .menu-item.active { background: #007bff; }

        /* Main Player Area */
        #content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #player-container { width: 90%; height: 70vh; background: #000; border: 4px solid #222; border-radius: 8px; }
        #fullscreen-btn { margin-top: 15px; padding: 12px 24px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="menu">
    <h2>Activities</h2>
    <button class="menu-item active" onclick="loadSWF('build_a_dinosaur.swf', this)">Build a Dinosaur</button>
    <button class="menu-item" onclick="loadSWF('pacman-flash.swf', this)">Pacman</button>
    <button class="menu-item" onclick="loadSWF('colouring-in_t-rex.swf', this)">Colouring-in T-Rex</button>
</div>

<div id="content">
    <h1 id="file-title">Select an Activity</h1>
    <div id="player-container"></div>
    <button id="fullscreen-btn" onclick="goFullscreen()">Enter Fullscreen</button>
</div>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<script>
    window.RufflePlayer = window.RufflePlayer || {};
    let player;

    // Initialize the player on page load
    window.addEventListener("load", () => {
        const ruffle = window.RufflePlayer.newest();
        player = ruffle.createPlayer();
        document.getElementById("player-container").appendChild(player);
        
        // Load the first file by default
        loadSWF('build_a_dinosaur.swf', document.querySelector('.menu-item'));
    });

    function loadSWF(fileName, element) {
        if (!player) return;

        // 1. Update the UI
        document.getElementById('file-title').innerText = "Playing: " + fileName;
        
        // 2. Update active button styling
        document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        // 3. Tell Ruffle to load the new file
        player.load({
            url: fileName,
            allowScriptAccess: true
        });
    }

    function goFullscreen() {
        if (player.requestFullscreen) player.requestFullscreen();
        else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
    }
</script>

</body>
</html>
